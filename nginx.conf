server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # CSP: Erlaubt Gemini API + unpkg (Blockly)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com; img-src 'self' data: https:; font-src 'self';";

    # Caching für statische Assets
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Docs-Unterseite
    location /docs/ {
        try_files $uri $uri/ /docs/index.html;
    }

    # Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fehlerseiten
    error_page 404 /index.html;
}
